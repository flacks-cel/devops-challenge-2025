<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>DevOps Challenge 2025 — Arquitetura</title>
  <desc>Diagrama mostrando Client fazendo requisições HTTP para Nginx com cache, que roteia para release-service (Python) e infra-service (Go). Prometheus e Grafana para observabilidade.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .label { font-size: 12px; fill: #555; }
      .title { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 11px; fill: #666; }
      .box-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .box-teal .title { fill: #085041; }
      .box-teal .sub { fill: #0F6E56; }
      .box-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .box-purple .title { fill: #3C3489; }
      .box-purple .sub { fill: #534AB7; }
      .box-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .box-gray .title { fill: #444441; }
      .box-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .box-amber .title { fill: #633806; }
      .box-amber .sub { fill: #854F0B; }
      .box-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .box-coral .title { fill: #712B13; }
      .box-coral .sub { fill: #993C1D; }
    </style>
  </defs>

  <rect x="0" y="0" width="680" height="480" fill="white"/>

  <!-- Docker Compose container -->
  <rect x="105" y="18" width="560" height="298" rx="12" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text class="label" x="122" y="37">docker compose</text>

  <!-- Observability container -->
  <rect x="118" y="356" width="448" height="102" rx="12" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text class="label" x="135" y="374">observabilidade</text>

  <!-- CLIENT -->
  <g class="box-gray">
    <rect x="10" y="148" width="85" height="44" rx="8" stroke-width="0.5"/>
    <text class="title" x="52" y="174" text-anchor="middle">Client</text>
  </g>

  <!-- NGINX -->
  <g class="box-teal">
    <rect x="148" y="72" width="192" height="158" rx="8" stroke-width="0.5"/>
    <text class="title" x="244" y="98" text-anchor="middle">Nginx</text>
    <text class="sub" x="244" y="118" text-anchor="middle">reverse proxy · :80</text>
    <text class="sub" x="244" y="140" text-anchor="middle">/release/ → cache 10s</text>
    <text class="sub" x="244" y="160" text-anchor="middle">/infra/ → cache 60s</text>
    <text class="sub" x="244" y="180" text-anchor="middle">X-Cache-Status header</text>
    <text class="sub" x="244" y="200" text-anchor="middle">proxy_cache (disco)</text>
  </g>

  <!-- RELEASE-SERVICE -->
  <g class="box-purple">
    <rect x="428" y="62" width="212" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="534" y="84" text-anchor="middle">release-service</text>
    <text class="sub" x="534" y="104" text-anchor="middle">Python · FastAPI · :8000</text>
  </g>

  <!-- INFRA-SERVICE -->
  <g class="box-purple">
    <rect x="428" y="198" width="212" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="534" y="220" text-anchor="middle">infra-service</text>
    <text class="sub" x="534" y="240" text-anchor="middle">Go · net/http · :8080</text>
  </g>

  <!-- PROMETHEUS -->
  <g class="box-amber">
    <rect x="148" y="374" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="title" x="228" y="396" text-anchor="middle">Prometheus</text>
    <text class="sub" x="228" y="414" text-anchor="middle">métricas · :9090</text>
  </g>

  <!-- GRAFANA -->
  <g class="box-coral">
    <rect x="408" y="374" width="148" height="52" rx="8" stroke-width="0.5"/>
    <text class="title" x="482" y="396" text-anchor="middle">Grafana</text>
    <text class="sub" x="482" y="414" text-anchor="middle">dashboard · :3000</text>
  </g>

  <!-- REQUEST FLOW: Client → Nginx -->
  <line x1="95" y1="170" x2="148" y2="158" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="label" x="116" y="152" text-anchor="middle">HTTP :80</text>

  <!-- REQUEST FLOW: Nginx → release-service -->
  <line x1="340" y1="124" x2="428" y2="93" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- REQUEST FLOW: Nginx → infra-service -->
  <line x1="340" y1="188" x2="428" y2="222" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- METRICS SCRAPE -->
  <path d="M534 254 L534 318 L228 318 L228 374" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <path d="M228 230 L228 318" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="label" x="390" y="312" text-anchor="middle">metrics scrape</text>

  <!-- Prometheus → Grafana -->
  <line x1="308" y1="400" x2="408" y2="400" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="label" x="358" y="393" text-anchor="middle">query</text>

  <!-- Legend -->
  <line x1="122" y1="452" x2="148" y2="452" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="label" x="155" y="456">request flow</text>
  <line x1="270" y1="452" x2="296" y2="452" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text class="label" x="303" y="456">metrics scrape</text>
</svg>